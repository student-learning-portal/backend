openapi: 3.0.3
info:
  title: Student Learning Portal API
  description: MVP endpoints for course catalog, auth, purchasing, access control, progress tracking, and analytics.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local MVP development server

paths:
  # ---------------------------------------------------------
  # AUTHENTICATION
  # ---------------------------------------------------------
  /auth/register:
    post:
      summary: Create a new student or teacher account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                full_name:
                  type: string
                role:
                  type: string
                  enum: [student, teacher]
                anonymous_id:
                  type: string
                  format: uuid
                  description: Links pre-auth anonymous activity to this account, if any.
      responses:
        '201':
          description: Account created. Returns a JWT token and the new user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
        '409':
          description: Email already registered

  /auth/login:
    post:
      summary: Login via email/password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Returns a JWT token and the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized

  /auth/me:
    get:
      summary: Get the currently authenticated user's profile
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ---------------------------------------------------------
  # CATALOG
  # ---------------------------------------------------------
  /catalog/courses:
    get:
      summary: Browsable catalog of courses with simple filtering
      tags:
        - Catalog
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Course title/description keyword search
        - in: query
          name: subject
          schema:
            type: string
          description: Partial, case-insensitive match against the course subject (e.g. "program" matches "Programming")
        - in: query
          name: min_price
          schema:
            type: number
          description: Lower bound (inclusive) for course price
        - in: query
          name: max_price
          schema:
            type: number
          description: Upper bound (inclusive) for course price
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [title, price, subject, created_at]
            default: title
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Array of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  # ---------------------------------------------------------
  # PURCHASE (SANDBOX)
  # ---------------------------------------------------------
  /purchase/checkout:
    post:
      summary: Initiate mock sandbox purchase for a course
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Mock checkout session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's remaining virtual wallet balance
                  payment_session_id:
                    type: string
                  redirect_url:
                    type: string
        '402':
          description: Insufficient virtual wallet balance
        '404':
          description: Course not found

  /purchase/refund:
    post:
      summary: Return a purchased course and refund the full amount to the buyer's virtual wallet
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Refund processed and access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's wallet balance after the refund
        '404':
          description: No active purchase found for this course

  /purchase/webhook:
    post:
      summary: Idempotent webhook entrypoint (Mocks payment success or refund/revocation)
      tags:
        - Purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_id:
                  type: string
                status:
                  type: string
                  enum: [SUCCESS, REFUNDED]
                user_id:
                  type: string
                course_id:
                  type: string
      responses:
        '200':
          description: Webhook processed successfully

  # ---------------------------------------------------------
  # PLAYER (ACCESS & PROGRESS)
  # ---------------------------------------------------------
  /player/courses/{course_id}/lessons/{lesson_id}:
    get:
      summary: Request to play a lesson (Enforces Access/Entitlement)
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access allowed. Returns lesson media and last saved progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonData'
        '403':
          description: Access denied (No active entitlement)

  /player/courses/{course_id}/lessons/{lesson_id}/progress:
    post:
      summary: Saves current play progress to DB
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - progress_seconds
              properties:
                progress_seconds:
                  type: integer
                  minimum: 0
                  description: Current playback offset, in seconds.
                completed:
                  type: boolean
                  description: Marks the lesson finished (forces percent_complete to 100).
      responses:
        '200':
          description: Progress saved. Returns the stored resume point.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '400':
          description: Invalid progress payload
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: Lesson not found in this course
    get:
      summary: Fetch the learner's saved resume point for a lesson
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The learner's saved resume point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: No saved progress yet

  # ---------------------------------------------------------
  # ANALYTICS (TEACHER & STUDENT)
  # ---------------------------------------------------------
  /analytics/teacher/dashboard:
    get:
      summary: Aggregated teacher view to detect struggling students
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns at-risk students and overall results
          content:
            application/json:
              schema:
                type: object
                properties:
                  at_risk_students:
                    type: integer
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        student_id:
                          type: string
                        progress_percentage:
                          type: number
                        status:
                          type: string
                          enum: [ON_TRACK, AT_RISK]

  /analytics/student/me:
    get:
      summary: Personal student progress across enrolled courses
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Summary of student progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_progress:
                    type: number
                  courses_completed:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [student, teacher]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teacher_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        subject:
          type: string
          description: Subject area, e.g. "english", "programming", "physics"
        price:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LessonData:
      type: object
      properties:
        lesson_id:
          type: string
        course_id:
          type: string
        title:
          type: string
        lesson_type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
        content_url:
          type: string
          format: uri
          description: Primary playable media URL for the lesson ("" when the lesson has no media).
        duration_seconds:
          type: integer
          description: Length of the primary media in seconds (0 when unknown).
        materials:
          type: array
          items:
            $ref: '#/components/schemas/Material'
        last_progress_seconds:
          type: integer
          description: The learner's last saved playback offset (0 if never started).
        percent_complete:
          type: number
          description: The learner's saved completion percentage (0–100).
    Material:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
    Progress:
      type: object
      properties:
        lesson_id:
          type: string
        progress_seconds:
          type: integer
        percent_complete:
          type: number
        completed:
          type: boolean
        updated_at:
          type: string
          format: date-time
