openapi: 3.0.3
info:
  title: Student Learning Portal API
  description: MVP endpoints for course catalog, auth, purchasing, access control, progress tracking, and analytics.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local MVP development server

paths:
  # ---------------------------------------------------------
  # AUTHENTICATION
  # ---------------------------------------------------------
  /auth/login:
    post:
      summary: Login via email/password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Returns a JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Unauthorized

  # ---------------------------------------------------------
  # CATALOG
  # ---------------------------------------------------------
  /catalog/courses:
    get:
      summary: Browsable catalog of courses with simple filtering
      tags:
        - Catalog
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Course title/description keyword search
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: Array of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  # ---------------------------------------------------------
  # PURCHASE (SANDBOX)
  # ---------------------------------------------------------
  /purchase/checkout:
    post:
      summary: Initiate mock sandbox purchase for a course
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Mock checkout session started

  /purchase/webhook:
    post:
      summary: Idempotent webhook entrypoint (Mocks payment success or refund/revocation)
      tags:
        - Purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_id:
                  type: string
                status:
                  type: string
                  enum: [SUCCESS, REFUNDED]
                user_id:
                  type: string
                course_id:
                  type: string
      responses:
        '200':
          description: Webhook processed successfully

  # ---------------------------------------------------------
  # PLAYER (ACCESS & PROGRESS)
  # ---------------------------------------------------------
  /player/courses/{course_id}/lessons/{lesson_id}:
    get:
      summary: Request to play a lesson (Enforces Access/Entitlement)
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access allowed. Returns lesson media and last saved progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonData'
        '403':
          description: Access denied (No active entitlement)

  /player/courses/{course_id}/lessons/{lesson_id}/progress:
    post:
      summary: Saves current play progress to DB
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                progress_seconds:
                  type: integer
                completed:
                  type: boolean
      responses:
        '200':
          description: Progress saved successfully

  # ---------------------------------------------------------
  # ANALYTICS (TEACHER & STUDENT)
  # ---------------------------------------------------------
  /analytics/teacher/dashboard:
    get:
      summary: Aggregated teacher view to detect struggling students
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns at-risk students and overall results
          content:
            application/json:
              schema:
                type: object
                properties:
                  at_risk_students:
                    type: integer
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        student_id:
                          type: string
                        progress_percentage:
                          type: number
                        status:
                          type: string
                          enum: [ON_TRACK, AT_RISK]

  /analytics/student/me:
    get:
      summary: Personal student progress across enrolled courses
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Summary of student progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_progress:
                    type: number
                  courses_completed:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        price:
          type: number
    LessonData:
      type: object
      properties:
        lesson_id:
          type: string
        content_url:
          type: string
          format: uri
        last_progress_seconds:
          type: integer
