openapi: 3.0.3
info:
  title: Student Learning Portal API
  description: >
    Endpoints for course catalog, auth, teacher content authoring,
    purchasing, access control, progress tracking, and analytics. Every
    handler is hand-registered in internal/delivery/http/router.go; the
    oapi-codegen-generated server interface in api_server.gen.go is not
    wired up and does not enforce this contract at runtime.
  version: 1.1.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  # ---------------------------------------------------------
  # HEALTH (unversioned — not under /api/v1)
  # ---------------------------------------------------------
  /hello:
    get:
      summary: Liveness check
      description: Confirms the routing and HTTP delivery layer are up. No auth, no dependencies checked.
      tags:
        - Health
      servers:
        - url: http://localhost:8080
          description: Root, not under /api/v1
      responses:
        '200':
          description: Service is routing requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello, World!"

  /health/db:
    get:
      summary: Database connectivity check
      description: Verifies the server can reach and query Postgres. No auth.
      tags:
        - Health
      responses:
        '200':
          description: Database reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: connected
        '500':
          description: Database unreachable

  # ---------------------------------------------------------
  # AUTHENTICATION
  # ---------------------------------------------------------
  /auth/register:
    post:
      summary: Create a new student or teacher account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                full_name:
                  type: string
                role:
                  type: string
                  enum: [student, teacher]
                anonymous_id:
                  type: string
                  format: uuid
                  description: Links pre-auth anonymous activity to this account, if any.
      responses:
        '201':
          description: Account created. Returns a JWT token and the new user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
        '409':
          description: Email already registered

  /auth/login:
    post:
      summary: Login via email/password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Returns a JWT token and the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized

  /auth/me:
    get:
      summary: Get the currently authenticated user's profile
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ---------------------------------------------------------
  # TEACHERS
  # ---------------------------------------------------------
  /teachers/{teacher_id}:
    get:
      summary: Get a teacher's public profile
      description: >
        Returns the public profile of a teacher account. Responds with 404 for
        unknown IDs and for IDs that belong to non-teacher accounts (prevents
        role enumeration). No authentication required.
      tags:
        - Teachers
      parameters:
        - in: path
          name: teacher_id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the teacher to retrieve
      responses:
        '200':
          description: Teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherProfile'
        '404':
          description: Teacher not found

  /teachers/{teacher_id}/ratings:
    get:
      summary: A teacher's aggregate 1-10 rating
      description: >
        Local rating system (internal/domain's CourseRating/TeacherRating —
        separate from the practicum-proxied course review/rating below,
        which has no notion of teachers). No authentication required.
      tags:
        - Teachers
      parameters:
        - in: path
          name: teacher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aggregate rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingSummary'
        '404':
          description: Teacher not found
    post:
      summary: Rate a teacher on a 1-10 scale
      description: >
        Student only. The student must be enrolled in at least one course
        taught by teacher_id. Resubmitting overwrites the student's prior
        score for this teacher rather than adding a second rating.
      tags:
        - Teachers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teacher_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 10
      responses:
        '201':
          description: Rating recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRating'
        '400':
          description: score is missing or outside 1-10
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not a student, or is not enrolled in any course by this teacher
        '404':
          description: teacher_id does not exist or does not belong to a teacher account

  /teachers/{teacher_id}/ratings/me:
    get:
      summary: The caller's own rating for a teacher
      tags:
        - Teachers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teacher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The caller's rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherRating'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not a student
        '404':
          description: teacher_id not found, or the caller has not rated this teacher yet

  # ---------------------------------------------------------
  # CATALOG
  # ---------------------------------------------------------
  /catalog/courses:
    get:
      summary: Browsable catalog of courses with simple filtering
      tags:
        - Catalog
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Course title/description keyword search
        - in: query
          name: subject
          schema:
            type: string
          description: Partial, case-insensitive match against the course subject (e.g. "program" matches "Programming")
        - in: query
          name: min_price
          schema:
            type: number
          description: Lower bound (inclusive) for course price
        - in: query
          name: max_price
          schema:
            type: number
          description: Upper bound (inclusive) for course price
        - in: query
          name: difficulty
          schema:
            type: string
            enum: [beginner, intermediate, advanced, all_levels]
          description: Exact match against the course's difficulty level
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [title, price, subject, created_at]
            default: title
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Array of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  /catalog/courses/{course_id}/lessons:
    get:
      summary: List all lessons for a course
      description: >
        Returns every lesson in the course, ordered by their position field.
        No authentication required. Returns an empty array when the course
        exists but has no lessons.
      tags:
        - Catalog
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the course whose lessons to retrieve
      responses:
        '200':
          description: Ordered list of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
        '400':
          description: Missing course_id

  /catalog/courses/{course_id}/rating:
    get:
      summary: A course's aggregate rating
      description: >
        Proxies to the practicum-team integration service
        (internal/practicum) rather than a locally-stored rating — we do not
        reimplement their review system. The course is mirrored into their
        system on first request for it (lazily), so the very first call for
        a given course incurs an extra round trip. No authentication
        required.
      tags:
        - Catalog
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aggregate rating
          content:
            application/json:
              schema:
                type: object
                properties:
                  average_rating:
                    type: number
                  reviews_count:
                    type: integer
        '404':
          description: Course not found
        '500':
          description: The practicum-team service is unreachable or returned an unexpected error

  /catalog/courses/{course_id}/comments:
    post:
      summary: Leave a review for a course
      description: >
        Student only. Proxies to the practicum-team integration service,
        which enforces the actual business rules: the student must hold an
        active entitlement for the course and have completed more than 50%
        of its lessons; one review per (course, student). This service does
        not re-check those rules locally — see internal/practicum.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                text:
                  type: string
                  maxLength: 2000
                  description: Optional review text
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  course_id:
                    type: string
                  student_id:
                    type: string
                  rating:
                    type: integer
                  text:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid rating/text, or malformed body
        '401':
          description: Missing or invalid bearer token
        '403':
          description: >
            Caller is not a student, is not enrolled in the course, or has
            not completed more than 50% of its lessons yet
        '404':
          description: Course not found
        '409':
          description: This student already reviewed this course

  /catalog/courses/{course_id}/ratings:
    get:
      summary: A course's aggregate 1-10 rating
      description: >
        Local rating system (internal/domain's CourseRating — separate from
        the singular /rating endpoint above, which proxies to the
        practicum-team service). No authentication required.
      tags:
        - Catalog
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aggregate rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingSummary'
        '404':
          description: Course not found
    post:
      summary: Rate a course on a 1-10 scale
      description: >
        Student only. The student must hold an active access grant for the
        course. Resubmitting overwrites the student's prior score for this
        course rather than adding a second rating.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 10
      responses:
        '201':
          description: Rating recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseRating'
        '400':
          description: score is missing or outside 1-10
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not a student, or does not hold an active entitlement for this course
        '404':
          description: Course not found

  /catalog/courses/{course_id}/ratings/me:
    get:
      summary: The caller's own rating for a course
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The caller's rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseRating'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not a student
        '404':
          description: Course not found, or the caller has not rated this course yet

  # ---------------------------------------------------------
  # USER — PROFILE MANAGEMENT
  # ---------------------------------------------------------
  /users/me/email:
    patch:
      summary: Change the authenticated user's email address
      description: Requires the current password to prevent account takeover.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_email]
              properties:
                current_password:
                  type: string
                  format: password
                new_email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email updated. Returns the updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid email format
        '401':
          description: Current password is incorrect
        '409':
          description: Email already registered

  /users/me/password:
    patch:
      summary: Change the authenticated user's password
      description: Requires the current password. Returns 204 on success.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '204':
          description: Password updated successfully
        '400':
          description: New password too short
        '401':
          description: Current password is incorrect

  /users/me/name:
    patch:
      summary: Change the authenticated user's display name
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name:
                  type: string
      responses:
        '200':
          description: Name updated. Returns the updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: full_name is empty

  /users/me/avatar:
    post:
      summary: Upload a profile picture
      description: >
        Accepts multipart/form-data with an `avatar` file field (max 5 MB).
        Supported types: JPEG, PNG, GIF, WebP. The file is saved server-side
        and the resulting URL is stored in the user's profile. The URL is
        accessible at `GET /uploads/avatars/{user_id}.{ext}`.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded. Returns the updated user profile including avatar_url.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Missing file or invalid multipart form
        '415':
          description: Unsupported image type

  # ---------------------------------------------------------
  # USER — PERSONAL COURSES
  # ---------------------------------------------------------
  /users/me/courses:
    get:
      summary: Get courses for the authenticated user
      description: >
        Teachers receive every course they created, ordered by creation date
        (newest first). Students receive every course they have an active
        (non-revoked) enrolment for, ordered alphabetically by title.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of courses belonging to or enrolled in by the caller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '401':
          description: Missing or invalid bearer token

  /users/me/results:
    get:
      summary: Aggregated progress across the caller's enrolled courses
      description: >
        Returns the caller's completion percentage and lesson tallies for every
        course they hold an active (non-revoked) entitlement for, ordered by
        course title, plus an overall roll-up. A lesson counts as completed once
        its saved progress reaches 100%. Not enrolled in anything yields an empty
        list with zeroed totals.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's aggregated progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResults'
        '401':
          description: Missing or invalid bearer token

  # ---------------------------------------------------------
  # PURCHASE (SANDBOX)
  # ---------------------------------------------------------
  /purchase/checkout:
    post:
      summary: Initiate mock sandbox purchase for a course
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Mock checkout session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's remaining virtual wallet balance
                  payment_session_id:
                    type: string
                  redirect_url:
                    type: string
        '402':
          description: Insufficient virtual wallet balance
        '404':
          description: Course not found
        '409':
          description: Course already purchased (active grant already exists)

  /purchase/history:
    get:
      summary: List the caller's payment history (purchases and refunds), newest first
      tags:
        - Purchase
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_id:
                          type: string
                        course_id:
                          type: string
                        course_title:
                          type: string
                        amount:
                          type: number
                        currency:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
        '401':
          description: Missing or invalid bearer token

  /purchase/refund:
    post:
      summary: Return a purchased course and refund the full amount to the buyer's virtual wallet
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Refund processed and access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's wallet balance after the refund
        '401':
          description: Missing or invalid bearer token
        '404':
          description: >
            No refundable purchase found for course_id. Covers two distinct
            cases that share this status: no active access grant for the
            course, or (rarer) the grant exists but its originating payment
            row is missing.

  /purchase/webhook:
    post:
      summary: Idempotent webhook entrypoint (Mocks payment success or refund/revocation)
      description: >
        Simulates a payment gateway's server-to-server callback. Idempotency:
        `transaction_id` is the payment table's primary key, so redelivering
        the same SUCCESS event is a no-op that returns 200 without granting
        access twice (ErrPaymentAlreadyRecorded, handled internally rather
        than surfaced as an error). No auth — a real gateway calls this
        anonymously and is trusted by shared secret/IP allowlist instead (not
        implemented in this sandbox).
      tags:
        - Purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transaction_id
                - status
                - user_id
                - course_id
              properties:
                transaction_id:
                  type: string
                status:
                  type: string
                  enum: [SUCCESS, REFUNDED]
                user_id:
                  type: string
                course_id:
                  type: string
      responses:
        '200':
          description: Webhook processed successfully (or was already processed — see idempotency note above)
        '400':
          description: Malformed body or a status value outside [SUCCESS, REFUNDED]
        '500':
          description: Internal error recording the payment/grant/refund

  # ---------------------------------------------------------
  # PLAYER (ACCESS & PROGRESS)
  # ---------------------------------------------------------
  /player/courses/{course_id}/lessons/{lesson_id}:
    get:
      summary: Request to play a lesson (Enforces Access/Entitlement)
      description: >
        Requires an active access grant for the course, with one carve-out:
        the course's own teacher always passes this check, so they can
        preview their own content without buying it. Every call (allow or
        deny) is written to an access-check audit log and emits an
        `access.check`/`access.denied` analytics event, regardless of outcome.
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access allowed. Returns lesson media and last saved progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonData'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Access denied (no active entitlement, and caller is not the course's teacher)

  /player/courses/{course_id}/lessons/{lesson_id}/progress:
    post:
      summary: Saves current play progress to DB
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - progress_seconds
              properties:
                progress_seconds:
                  type: integer
                  minimum: 0
                  description: Current playback offset, in seconds.
                completed:
                  type: boolean
                  description: Marks the lesson finished (forces percent_complete to 100).
      responses:
        '200':
          description: Progress saved. Returns the stored resume point.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '400':
          description: Invalid progress payload
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: Lesson not found in this course
    get:
      summary: Fetch the learner's saved resume point for a lesson
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The learner's saved resume point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: No saved progress yet

  # ---------------------------------------------------------
  # ANALYTICS (TEACHER & STUDENT)
  # ---------------------------------------------------------
  /analytics/teacher/dashboard:
    get:
      summary: Aggregated teacher view to detect struggling students
      description: >
        Caller must be a teacher and must own course_id. A student is
        AT_RISK when progress_percentage is below 40%, or there has been no
        `player.*` activity for more than 7 days (no activity at all always
        counts as at risk) — see domain.ClassifyRisk / DefaultRiskThresholds.
        Backed by a periodic rollup, so results can lag a learner's very
        latest activity by up to one loader run.
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns at-risk students and overall results
          content:
            application/json:
              schema:
                type: object
                properties:
                  at_risk_students:
                    type: integer
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        student_id:
                          type: string
                        full_name:
                          type: string
                        progress_percentage:
                          type: number
                        lessons_completed:
                          type: integer
                        lessons_total:
                          type: integer
                        status:
                          type: string
                          enum: [ON_TRACK, AT_RISK]
                        days_inactive:
                          type: integer
                          description: Null/absent if the student has never been active.
                        last_activity:
                          type: string
                          format: date-time
                          nullable: true
        '400':
          description: Missing course_id
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not a teacher, or does not own course_id
        '404':
          description: course_id not found

  /analytics/student/me:
    get:
      summary: Personal student progress across enrolled courses
      description: >
        Keyed by the caller's own actor_id rather than a course_id. A course
        the caller enrolled in but that hasn't been picked up by the rollup
        loader yet simply doesn't appear (no error). Uses the same AT_RISK
        rule as the teacher dashboard (see above).
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Summary of student progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_progress:
                    type: number
                  courses_completed:
                    type: integer
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        course_id:
                          type: string
                        course_title:
                          type: string
                        progress_percentage:
                          type: number
                        lessons_completed:
                          type: integer
                        lessons_total:
                          type: integer
                        status:
                          type: string
                          enum: [ON_TRACK, AT_RISK]
                        days_inactive:
                          type: integer
        '401':
          description: Missing or invalid bearer token

  # ---------------------------------------------------------
  # TEACHER CONTENT AUTHORING (courses, lessons, media, materials)
  # ---------------------------------------------------------
  /teacher/courses:
    post:
      summary: Create a new draft course owned by the caller
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseInput'
      responses:
        '201':
          description: Course created (always starts as draft)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Invalid input
        '403':
          description: Teacher role required

  /teacher/courses/{course_id}:
    patch:
      summary: Update an owned course's fields and status
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CourseInput'
                - type: object
                  required:
                    - status
                  properties:
                    status:
                      type: string
                      enum: [draft, published, archived]
      responses:
        '200':
          description: Updated course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          description: Invalid input
        '403':
          description: Not the owning teacher
        '404':
          description: Course not found
    delete:
      summary: Delete a draft course (published/archived courses must be archived instead)
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Course deleted
        '403':
          description: Not the owning teacher
        '404':
          description: Course not found
        '409':
          description: Course is not a draft

  /teacher/courses/{course_id}/lessons:
    post:
      summary: Append a new lesson to an owned course
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonInput'
      responses:
        '201':
          description: Lesson created at the end of the course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherLesson'
        '400':
          description: Invalid input
        '403':
          description: Not the owning teacher
        '404':
          description: Course not found

  /teacher/courses/{course_id}/lessons/order:
    put:
      summary: Reorder an owned course's lessons
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lesson_ids
              properties:
                lesson_ids:
                  type: array
                  description: Every lesson id in the course, in the desired order.
                  items:
                    type: string
      responses:
        '204':
          description: Lessons reordered
        '400':
          description: lesson_ids doesn't match the course's current lessons
        '403':
          description: Not the owning teacher
        '404':
          description: Course not found

  /teacher/courses/{course_id}/lessons/{lesson_id}:
    patch:
      summary: Update an owned lesson's title/type
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonInput'
      responses:
        '200':
          description: Updated lesson
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherLesson'
        '400':
          description: Invalid input
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found
    delete:
      summary: Delete a lesson (and its media/materials)
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Lesson deleted
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found

  /teacher/courses/{course_id}/lessons/{lesson_id}/media:
    put:
      summary: Replace a lesson's playable media asset
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - media_type
              properties:
                url:
                  type: string
                  format: uri
                duration_seconds:
                  type: integer
                  minimum: 0
                media_type:
                  type: string
                  enum: [video, audio]
      responses:
        '200':
          description: Media set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherMedia'
        '400':
          description: Invalid input
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found
    delete:
      summary: Remove a lesson's media asset, if any
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Media removed
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found

  /teacher/courses/{course_id}/lessons/{lesson_id}/media/upload:
    post:
      summary: Upload a lesson's playable media asset as a file
      description: >
        Alternative to PUT .../media for teachers who have a local file
        instead of an already-hosted URL. Saved under
        uploadsDir/lessons/{lesson_id}/ and served back from /uploads/, then
        stored via the same path as the URL-based flow (SetLessonMedia).
        `duration_seconds` should be read client-side from the browser's own
        media metadata before uploading — the server does not probe files.
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: video/mp4, video/webm, audio/mpeg, audio/wav, or audio/ogg — max 500 MB
                duration_seconds:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Media uploaded and set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherMedia'
        '400':
          description: Missing file, invalid lesson_id, or invalid multipart form
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found
        '415':
          description: Unsupported file type

  /teacher/courses/{course_id}/lessons/{lesson_id}/materials:
    post:
      summary: Attach a downloadable material to a lesson
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - url
              properties:
                title:
                  type: string
                url:
                  type: string
                  format: uri
                type:
                  type: string
                  description: Free-form attachment kind, e.g. "pdf", "zip", "link".
      responses:
        '201':
          description: Material attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherMaterial'
        '400':
          description: Invalid input
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found

  /teacher/courses/{course_id}/lessons/{lesson_id}/materials/upload:
    post:
      summary: Upload a downloadable material as a file
      description: >
        Alternative to POST .../materials for teachers who have a local file
        instead of an already-hosted URL. Saved under
        uploadsDir/lessons/{lesson_id}/ and served back from /uploads/.
        `title` defaults to the uploaded filename when omitted.
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: application/pdf, application/zip, image/jpeg, or image/png — max 50 MB
                title:
                  type: string
      responses:
        '201':
          description: Material uploaded and attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherMaterial'
        '400':
          description: Missing file, invalid lesson_id, or invalid multipart form
        '403':
          description: Not the owning teacher
        '404':
          description: Course or lesson not found
        '415':
          description: Unsupported file type

  /teacher/courses/{course_id}/lessons/{lesson_id}/materials/{material_id}:
    delete:
      summary: Remove a single material from a lesson
      tags:
        - Teacher Content
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
        - in: path
          name: material_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Material removed
        '403':
          description: Not the owning teacher
        '404':
          description: Course, lesson, or material not found

  # ---------------------------------------------------------
  # CHAT (student <-> teacher, scoped to a course)
  # ---------------------------------------------------------
  /courses/{course_id}/messages:
    parameters:
      - in: path
        name: course_id
        required: true
        schema:
          type: string
    get:
      summary: The calling student's conversation with the course's teacher
      description: Requires an enrolled student (active grant); returns messages oldest-first.
      tags: [Chat]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Messages in the student's thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Not a student, or not enrolled in this course
    post:
      summary: Student sends a message to the course's teacher
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessage'
      responses:
        '201':
          description: Message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Empty/invalid body
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Not a student, or not enrolled in this course

  /teacher/courses/{course_id}/threads:
    get:
      summary: The owning teacher's inbox of student conversations
      description: One entry per student who has a conversation, most-recently-active first.
      tags: [Chat]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thread summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ThreadSummary'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Not a teacher, or does not own this course
        '404':
          description: Course not found

  /teacher/courses/{course_id}/threads/{student_id}/messages:
    parameters:
      - in: path
        name: course_id
        required: true
        schema:
          type: string
      - in: path
        name: student_id
        required: true
        schema:
          type: string
    get:
      summary: The owning teacher reads one student's thread
      tags: [Chat]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Messages in the thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Not a teacher, or does not own this course
        '404':
          description: Course not found
    post:
      summary: The owning teacher replies in a student's thread
      tags: [Chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessage'
      responses:
        '201':
          description: Reply created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Empty/invalid body
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Not a teacher, or does not own this course
        '404':
          description: Course not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [student, teacher]
        balance:
          type: number
          description: Virtual wallet balance (sandbox only)
        avatar_url:
          type: string
          description: Server-relative path to the profile picture, e.g. /uploads/avatars/{id}.jpg. Omitted when no avatar has been set.
    TeacherProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        role:
          type: string
          enum: [teacher]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    RatingSummary:
      type: object
      description: >
        Aggregate always computed from the underlying rating rows (AVG/COUNT),
        never stored directly.
      properties:
        average_score:
          type: number
        ratings_count:
          type: integer
    CourseRating:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        score:
          type: integer
          minimum: 1
          maximum: 10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TeacherRating:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teacher_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        score:
          type: integer
          minimum: 1
          maximum: 10
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teacher_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        subject:
          type: string
          description: Subject area, e.g. "english", "programming", "physics"
        price:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced, all_levels]
          default: all_levels
        duration_minutes:
          type: integer
          description: Teacher-supplied estimate of total course length; not derived from lesson media.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Lesson:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
          description: 1-based display order within the course
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LessonData:
      type: object
      properties:
        lesson_id:
          type: string
        course_id:
          type: string
        title:
          type: string
        lesson_type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
        content_url:
          type: string
          format: uri
          description: Primary playable media URL for the lesson ("" when the lesson has no media).
        duration_seconds:
          type: integer
          description: Length of the primary media in seconds (0 when unknown).
        media_type:
          type: string
          enum: [video, audio]
          description: Type of the primary media asset. Omitted when the lesson has no media.
        materials:
          type: array
          items:
            $ref: '#/components/schemas/Material'
        last_progress_seconds:
          type: integer
          description: The learner's last saved playback offset (0 if never started).
        percent_complete:
          type: number
          description: The learner's saved completion percentage (0–100).
    Material:
      type: object
      properties:
        id:
          type: string
          description: Present so the owning teacher's editor can reference this material (e.g. to delete it).
        title:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
    Progress:
      type: object
      properties:
        lesson_id:
          type: string
        progress_seconds:
          type: integer
        percent_complete:
          type: number
        completed:
          type: boolean
        updated_at:
          type: string
          format: date-time
    CourseResult:
      type: object
      properties:
        course_id:
          type: string
        title:
          type: string
        lessons_total:
          type: integer
        lessons_completed:
          type: integer
        progress_percent:
          type: number
          description: lessons_completed / lessons_total as a 0–100 value.
        status:
          type: string
          enum: [ON_TRACK, AT_RISK]
        days_inactive:
          type: integer
    StudentResults:
      type: object
      properties:
        overall_progress_percent:
          type: number
          description: Completed lessons over total lessons across all enrolled courses (0–100).
        courses_enrolled:
          type: integer
        courses_completed:
          type: integer
          description: Number of enrolled courses that are 100% complete.
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseResult'
    CourseInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        subject:
          type: string
          description: Defaults to "general" when omitted.
        price:
          type: number
          minimum: 0
        currency:
          type: string
          description: Defaults to "USD" when omitted.
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced, all_levels]
          description: Defaults to "all_levels" when omitted.
        duration_minutes:
          type: integer
          minimum: 0
    LessonInput:
      type: object
      required:
        - title
        - lesson_type
      properties:
        title:
          type: string
        lesson_type:
          type: string
          enum: [video, text, quiz, mixed]
    TeacherLesson:
      type: object
      properties:
        lesson_id:
          type: string
        course_id:
          type: string
        title:
          type: string
        lesson_type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
    TeacherMedia:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        duration_seconds:
          type: integer
        media_type:
          type: string
          enum: [video, audio]
    TeacherMaterial:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
    SendMessage:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          description: Message text (whitespace-only is rejected).
        lesson_id:
          type: string
          description: Optional lesson this message is about.
    Message:
      type: object
      properties:
        id:
          type: string
        course_id:
          type: string
        student_id:
          type: string
          description: The student participant (thread owner), regardless of who sent this message.
        lesson_id:
          type: string
          nullable: true
        sender_role:
