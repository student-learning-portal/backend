openapi: 3.0.3
info:
  title: Student Learning Portal API
  description: MVP endpoints for course catalog, auth, purchasing, access control, progress tracking, and analytics.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local MVP development server

paths:
  # ---------------------------------------------------------
  # AUTHENTICATION
  # ---------------------------------------------------------
  /auth/register:
    post:
      summary: Create a new student or teacher account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                full_name:
                  type: string
                role:
                  type: string
                  enum: [student, teacher]
                anonymous_id:
                  type: string
                  format: uuid
                  description: Links pre-auth anonymous activity to this account, if any.
      responses:
        '201':
          description: Account created. Returns a JWT token and the new user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
        '409':
          description: Email already registered

  /auth/login:
    post:
      summary: Login via email/password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Returns a JWT token and the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized

  /auth/me:
    get:
      summary: Get the currently authenticated user's profile
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ---------------------------------------------------------
  # TEACHERS
  # ---------------------------------------------------------
  /teachers/{teacher_id}:
    get:
      summary: Get a teacher's public profile
      description: >
        Returns the public profile of a teacher account. Responds with 404 for
        unknown IDs and for IDs that belong to non-teacher accounts (prevents
        role enumeration). No authentication required.
      tags:
        - Teachers
      parameters:
        - in: path
          name: teacher_id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the teacher to retrieve
      responses:
        '200':
          description: Teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherProfile'
        '404':
          description: Teacher not found

  # ---------------------------------------------------------
  # CATALOG
  # ---------------------------------------------------------
  /catalog/courses:
    get:
      summary: Browsable catalog of courses with simple filtering
      tags:
        - Catalog
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Course title/description keyword search
        - in: query
          name: subject
          schema:
            type: string
          description: Partial, case-insensitive match against the course subject (e.g. "program" matches "Programming")
        - in: query
          name: min_price
          schema:
            type: number
          description: Lower bound (inclusive) for course price
        - in: query
          name: max_price
          schema:
            type: number
          description: Upper bound (inclusive) for course price
        - in: query
          name: sort_by
          schema:
            type: string
            enum: [title, price, subject, created_at]
            default: title
        - in: query
          name: sort_order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Array of available courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  /catalog/courses/{course_id}/lessons:
    get:
      summary: List all lessons for a course
      description: >
        Returns every lesson in the course, ordered by their position field.
        No authentication required. Returns an empty array when the course
        exists but has no lessons.
      tags:
        - Catalog
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the course whose lessons to retrieve
      responses:
        '200':
          description: Ordered list of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
        '400':
          description: Missing course_id

  # ---------------------------------------------------------
  # USER — PROFILE MANAGEMENT
  # ---------------------------------------------------------
  /users/me/email:
    patch:
      summary: Change the authenticated user's email address
      description: Requires the current password to prevent account takeover.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_email]
              properties:
                current_password:
                  type: string
                  format: password
                new_email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email updated. Returns the updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid email format
        '401':
          description: Current password is incorrect
        '409':
          description: Email already registered

  /users/me/password:
    patch:
      summary: Change the authenticated user's password
      description: Requires the current password. Returns 204 on success.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '204':
          description: Password updated successfully
        '400':
          description: New password too short
        '401':
          description: Current password is incorrect

  /users/me/name:
    patch:
      summary: Change the authenticated user's display name
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name:
                  type: string
      responses:
        '200':
          description: Name updated. Returns the updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: full_name is empty

  /users/me/avatar:
    post:
      summary: Upload a profile picture
      description: >
        Accepts multipart/form-data with an `avatar` file field (max 5 MB).
        Supported types: JPEG, PNG, GIF, WebP. The file is saved server-side
        and the resulting URL is stored in the user's profile. The URL is
        accessible at `GET /uploads/avatars/{user_id}.{ext}`.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded. Returns the updated user profile including avatar_url.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Missing file or invalid multipart form
        '415':
          description: Unsupported image type

  # ---------------------------------------------------------
  # USER — PERSONAL COURSES
  # ---------------------------------------------------------
  /users/me/courses:
    get:
      summary: Get courses for the authenticated user
      description: >
        Teachers receive every course they created, ordered by creation date
        (newest first). Students receive every course they have an active
        (non-revoked) enrolment for, ordered alphabetically by title.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of courses belonging to or enrolled in by the caller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
        '401':
          description: Missing or invalid bearer token

  /users/me/results:
    get:
      summary: Aggregated progress across the caller's enrolled courses
      description: >
        Returns the caller's completion percentage and lesson tallies for every
        course they hold an active (non-revoked) entitlement for, ordered by
        course title, plus an overall roll-up. A lesson counts as completed once
        its saved progress reaches 100%. Not enrolled in anything yields an empty
        list with zeroed totals.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's aggregated progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResults'
        '401':
          description: Missing or invalid bearer token

  # ---------------------------------------------------------
  # PURCHASE (SANDBOX)
  # ---------------------------------------------------------
  /purchase/checkout:
    post:
      summary: Initiate mock sandbox purchase for a course
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Mock checkout session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's remaining virtual wallet balance
                  payment_session_id:
                    type: string
                  redirect_url:
                    type: string
        '402':
          description: Insufficient virtual wallet balance
        '404':
          description: Course not found
        '409':
          description: Course already purchased (active grant already exists)

  /purchase/history:
    get:
      summary: List the caller's payment history (purchases and refunds), newest first
      tags:
        - Purchase
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_id:
                          type: string
                        course_id:
                          type: string
                        course_title:
                          type: string
                        amount:
                          type: number
                        currency:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
        '401':
          description: Missing or invalid bearer token

  /purchase/refund:
    post:
      summary: Return a purchased course and refund the full amount to the buyer's virtual wallet
      tags:
        - Purchase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: string
      responses:
        '200':
          description: Refund processed and access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                  status:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string
                  balance:
                    type: number
                    description: Buyer's wallet balance after the refund
        '404':
          description: No active purchase found for this course

  /purchase/webhook:
    post:
      summary: Idempotent webhook entrypoint (Mocks payment success or refund/revocation)
      tags:
        - Purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_id:
                  type: string
                status:
                  type: string
                  enum: [SUCCESS, REFUNDED]
                user_id:
                  type: string
                course_id:
                  type: string
      responses:
        '200':
          description: Webhook processed successfully

  # ---------------------------------------------------------
  # PLAYER (ACCESS & PROGRESS)
  # ---------------------------------------------------------
  /player/courses/{course_id}/lessons/{lesson_id}:
    get:
      summary: Request to play a lesson (Enforces Access/Entitlement)
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access allowed. Returns lesson media and last saved progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonData'
        '403':
          description: Access denied (No active entitlement)

  /player/courses/{course_id}/lessons/{lesson_id}/progress:
    post:
      summary: Saves current play progress to DB
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - progress_seconds
              properties:
                progress_seconds:
                  type: integer
                  minimum: 0
                  description: Current playback offset, in seconds.
                completed:
                  type: boolean
                  description: Marks the lesson finished (forces percent_complete to 100).
      responses:
        '200':
          description: Progress saved. Returns the stored resume point.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '400':
          description: Invalid progress payload
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: Lesson not found in this course
    get:
      summary: Fetch the learner's saved resume point for a lesson
      tags:
        - Player
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: course_id
          required: true
          schema:
            type: string
        - in: path
          name: lesson_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The learner's saved resume point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '403':
          description: Access denied (No active entitlement)
        '404':
          description: No saved progress yet

  # ---------------------------------------------------------
  # ANALYTICS (TEACHER & STUDENT)
  # ---------------------------------------------------------
  /analytics/teacher/dashboard:
    get:
      summary: Aggregated teacher view to detect struggling students
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: course_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns at-risk students and overall results
          content:
            application/json:
              schema:
                type: object
                properties:
                  at_risk_students:
                    type: integer
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        student_id:
                          type: string
                        progress_percentage:
                          type: number
                        status:
                          type: string
                          enum: [ON_TRACK, AT_RISK]

  /analytics/student/me:
    get:
      summary: Personal student progress across enrolled courses
      tags:
        - Analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Summary of student progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_progress:
                    type: number
                  courses_completed:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [student, teacher]
        balance:
          type: number
          description: Virtual wallet balance (sandbox only)
        avatar_url:
          type: string
          description: Server-relative path to the profile picture, e.g. /uploads/avatars/{id}.jpg. Omitted when no avatar has been set.
    TeacherProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        role:
          type: string
          enum: [teacher]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        teacher_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        subject:
          type: string
          description: Subject area, e.g. "english", "programming", "physics"
        price:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Lesson:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
          description: 1-based display order within the course
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LessonData:
      type: object
      properties:
        lesson_id:
          type: string
        course_id:
          type: string
        title:
          type: string
        lesson_type:
          type: string
          enum: [video, text, quiz, mixed]
        position:
          type: integer
        content_url:
          type: string
          format: uri
          description: Primary playable media URL for the lesson ("" when the lesson has no media).
        duration_seconds:
          type: integer
          description: Length of the primary media in seconds (0 when unknown).
        materials:
          type: array
          items:
            $ref: '#/components/schemas/Material'
        last_progress_seconds:
          type: integer
          description: The learner's last saved playback offset (0 if never started).
        percent_complete:
          type: number
          description: The learner's saved completion percentage (0–100).
    Material:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
    Progress:
      type: object
      properties:
        lesson_id:
          type: string
        progress_seconds:
          type: integer
        percent_complete:
          type: number
        completed:
          type: boolean
        updated_at:
          type: string
          format: date-time
    CourseResult:
      type: object
      properties:
        course_id:
          type: string
        title:
          type: string
        lessons_total:
          type: integer
        lessons_completed:
          type: integer
        progress_percent:
          type: number
          description: lessons_completed / lessons_total as a 0–100 value.
    StudentResults:
      type: object
      properties:
        overall_progress_percent:
          type: number
          description: Completed lessons over total lessons across all enrolled courses (0–100).
        courses_enrolled:
          type: integer
        courses_completed:
          type: integer
          description: Number of enrolled courses that are 100% complete.
        courses:
          type: array
          items:
            $ref: '#/components/schemas/CourseResult'
